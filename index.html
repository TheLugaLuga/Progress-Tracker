<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker - Macro AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Macro Tracker AI</h1>
        
        <div class="input-section">
            <input type="text" id="nlpInput" placeholder="Ex: 2 eggs and 100g of bacon...">
            <button onclick="analyzeFood()">Adaugă în Meniu</button>
        </div>

        <div id="loader" style="display:none;">Analizez nutrienții... 🥗</div>

        <table id="foodTable">
            <thead>
                <tr>
                    <th>Aliment</th>
                    <th>P (g)</th>
                    <th>C (g)</th>
                    <th>G (g)</th>
                    <th>Kcal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="foodList">
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
